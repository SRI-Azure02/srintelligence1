name: Build and deploy Node.js app to Azure Web App - SRIntelligence

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install, build, and test
        run: |
          npm ci
          npm run build
          npm run test:ci

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZUREAPPSERVICE_CLIENTID_FFEE4CD35731471ABDD35C4476014E3A }}
          tenant-id:       ${{ secrets.AZUREAPPSERVICE_TENANTID_EE889F08D88D47CBA02B87AC4723C535 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D8397C72EAF847028FD73F7EB2CD8798 }}

      - name: Configure App Service settings
        run: |
          az webapp config appsettings set \
            --name SRIntelligence \
            --resource-group SRIntelligence_group \
            --settings WEBSITES_PORT=3000 NODE_ENV=production

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'SRIntelligence'
          slot-name: 'Production'
          package: .
          startup-command: 'npm start'
