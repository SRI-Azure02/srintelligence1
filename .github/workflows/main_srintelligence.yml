# Build and deploy to Azure Container Apps — production (main branch)
# Uses the OIDC credentials Azure Portal already configured for this app.
#
# Required GitHub Secrets (set by Azure Portal — already exist):
#   AZUREAPPSERVICE_CLIENTID_*      ← OIDC client ID
#   AZUREAPPSERVICE_TENANTID_*      ← Azure tenant ID
#   AZUREAPPSERVICE_SUBSCRIPTIONID_*← Azure subscription ID
#
# Additional secrets you must add:
#   ACR_LOGIN_SERVER                ← e.g. srintelligence.azurecr.io
#   ACR_NAME                        ← e.g. srintelligence
#   AZURE_RESOURCE_GROUP            ← your resource group name
#   AZURE_CONTAINER_APP_NAME        ← your Container App name

name: Build and deploy to Azure Container Apps - SRIntelligence

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY:      ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME:    srintelligence
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP:  ${{ secrets.AZURE_CONTAINER_APP_NAME }}

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # test:ci exits cleanly (no watch mode) — safe for CI
      - run: npm run test:ci

  build-and-deploy:
    name: Build image & deploy to Container Apps
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write   # required for OIDC login
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZUREAPPSERVICE_CLIENTID_FFEE4CD35731471ABDD35C4476014E3A }}
          tenant-id:       ${{ secrets.AZUREAPPSERVICE_TENANTID_EE889F08D88D47CBA02B87AC4723C535 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D8397C72EAF847028FD73F7EB2CD8798 }}

      - name: Log in to Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set image tag
        id: tag
        run: |
          SHA=$(echo $GITHUB_SHA | head -c7)
          echo "tag=main-$SHA" >> $GITHUB_OUTPUT

      - name: Build & push Docker image
        run: |
          docker build \
            -t $REGISTRY/$IMAGE_NAME:${{ steps.tag.outputs.tag }} \
            -t $REGISTRY/$IMAGE_NAME:latest \
            .
          docker push $REGISTRY/$IMAGE_NAME:${{ steps.tag.outputs.tag }}
          docker push $REGISTRY/$IMAGE_NAME:latest

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$REGISTRY/$IMAGE_NAME:${{ steps.tag.outputs.tag }}"
