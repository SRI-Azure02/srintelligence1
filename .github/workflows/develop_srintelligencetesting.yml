name: Build and deploy Node.js app to Azure Web App - SRIntelligencetesting

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install, build, and test
        run: |
          npm ci
          npm run build
          npm run test:ci

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZUREAPPSERVICE_CLIENTID_C401D9BB780D49D39BD59EA4811F9581 }}
          tenant-id:       ${{ secrets.AZUREAPPSERVICE_TENANTID_8B987A8A09FD4D2794EB4F54687D9045 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C056E7739D05424FA0D30AC3613CB85F }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'SRIntelligencetesting'
          slot-name: 'Production'
          package: .
