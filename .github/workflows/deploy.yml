name: Build & Deploy to Azure Container Apps

on:
  workflow_dispatch:  # manual trigger only
  # Auto-deploy is handled by the Azure Portal workflows:
  #   main    → main_srintelligence.yml       (production)
  #   develop → develop_srintelligencetesting.yml (staging)
  # Use this workflow to deploy manually to an arbitrary branch/environment.

env:
  REGISTRY:       ${{ secrets.ACR_LOGIN_SERVER }}   # e.g. srintelligence.azurecr.io
  IMAGE_NAME:     srintelligence
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP:  ${{ secrets.AZURE_CONTAINER_APP_NAME }}

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:ci

  build-and-deploy:
    name: Build image & deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set image tag
        id: tag
        run: |
          SHA=$(echo $GITHUB_SHA | head -c7)
          BRANCH=$(echo $GITHUB_REF_NAME | sed 's/[^a-zA-Z0-9]/-/g')
          echo "tag=$BRANCH-$SHA" >> $GITHUB_OUTPUT

      - name: Build & push Docker image
        run: |
          docker build \
            -t $REGISTRY/$IMAGE_NAME:${{ steps.tag.outputs.tag }} \
            -t $REGISTRY/$IMAGE_NAME:latest \
            .
          docker push $REGISTRY/$IMAGE_NAME:${{ steps.tag.outputs.tag }}
          docker push $REGISTRY/$IMAGE_NAME:latest

      # Update the existing Container App with the new image.
      # This works whether the app was created via Bicep or the Azure Portal.
      - name: Deploy to existing Container App
        run: |
          az containerapp update \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$REGISTRY/$IMAGE_NAME:${{ steps.tag.outputs.tag }}"

      # Bicep runs only when infra files change — keeps infra as code
      # without recreating the Container App on every push.
      - name: Update infrastructure (if infra/ changed)
        if: contains(github.event.head_commit.modified, 'infra/')
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template:          ./infra/main.bicep
          parameters: >
            infra/main.parameters.json
            containerImage=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            anthropicApiKey=${{ secrets.ANTHROPIC_API_KEY }}
            snowflakeAccount=${{ secrets.SNOWFLAKE_ACCOUNT }}
            snowflakeUsername=${{ secrets.SNOWFLAKE_USERNAME }}
            snowflakePat=${{ secrets.SNOWFLAKE_PAT }}
            snowflakePrivateKey=${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
            snowflakeRole=${{ secrets.SNOWFLAKE_ROLE }}
            snowflakeWarehouse=${{ secrets.SNOWFLAKE_WAREHOUSE }}
            snowflakeDatabase=${{ secrets.SNOWFLAKE_DATABASE }}
            snowflakeSchema=${{ secrets.SNOWFLAKE_SCHEMA }}
            snowflakeMlSchema=${{ secrets.SNOWFLAKE_ML_SCHEMA }}
            snowflakeSemanticView=${{ secrets.SNOWFLAKE_SEMANTIC_VIEW }}
            cronSecret=${{ secrets.CRON_SECRET }}
            webhookSecret=${{ secrets.WEBHOOK_SECRET }}
          deploymentMode: Incremental
